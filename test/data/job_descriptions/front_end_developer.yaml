description: |
  It's fun to work in a company where people truly BELIEVE in what they're doing!

  Fullsteam is a leading provider of vertical software and embedded payments technology dedicated to helping businesses flourish by providing their customers with seamless experiences. With a dynamic and growing team of over 1,900 employees, we are committed to driving innovation and delivering best-in-class software and payment solutions that empower small and medium-sized businesses across numerous industries. Our purpose is to help our customers grow their businesses and delight their customers. Join us and be a part of a forward-thinking company that values growth, excellence, and the success of our clients.

  Commerce7, part of the Fullsteam organization, is a customer centric commerce platform in the alcohol industry. Today we are the platform that powers over 2500 leading alcohol brands including Opus One, Caymus, Harlan Estate, William Chris Winery and more.

  We are looking for a Frontend Engineer who is passionate about building high-quality, scalable experiences on the web. You are results-driven, detail-oriented, and thrive on collaboration with a team that values openness and pushing the bar. You will work closely with product, backend, and QA teams to design and maintain user-facing applications across our suite of products, including ecommerce tools, a point of sale system, reservation software, and CRM. Our tech stack is Node.js, React, and AWS, with libraries such as React Router, Redux, and Styled Components. Development is fast-paced, with continuous feature releases and improvements.

  Primary Responsibilities:

  Architect, build, and scale customer-facing applications across the Commerce7 platform, including point of sale, e-commerce, reservation, and CRM tools.
  Collaborate closely with backend engineers to understand and integrate with system APIs, ensuring smooth feature delivery and minimal rework. Partner with QA to ensure features are production ready.
  Improve, refactor, and maintain existing UX/UI, enhancing usability, and responsiveness across the platform.
  Ensure frontend code follows modern coding practices, industry standards, and internal conventions
  Participate in code reviews, promoting best practices for code quality, maintainability, performance, and scalability.
  Contribute to technical documentation for frontend workflows, component libraries, and UX patterns to support cross-team collaboration.
  Champion a culture of customer-focused UX/UI, consistency, and quality throughout the product.

  Skills & Competencies:

  Experience developing large-scale frontend applications with a solid understanding of frontend architectures and state management.
  Desire to own code quality and user experience, with a commitment to delivering excellence and meeting high QA standards.
  Excellent verbal and written communication skills, with the ability to collaborate effectively across engineering, product, and QA teams.
  Understanding of fundamental UX principles for the web.
  Curiosity and a commitment to continuous learning and improvement.
  A deep empathy for the user and a desire to learn about how they use Commerce7.
  Experience with ecommerce or point of sale platforms is a bonus.

  Minimum Qualifications:

  Demonstrated ability to work independently, manage priorities, and deliver frontend features on schedule
  Proficient in JavaScript (ES6+) and React, with experience using Webpack, Babel, NPM, or similar build tools.
  Strong proficiency in HTML, CSS, and preferably styled components or component-based styling.
  Experience integrating with REST APIs
  Experience with version control systems (e.g., Git)
  Experience with testing frameworks, including automated integration and unit testing.

  Salary range: CA$62,651 to CA$112,562

  Fullsteam recognizes that your health and wellbeing are a priority. This is why we offer a full suite of benefits that include:
  •  Medical
  •  Extended Health and LTD plan
  •  Dental
  •  Vision
  •  RRSP (with employer match)
  •  Health Spending Account
  •  Flexible paid time off

  This posting is for an existing vacancy and will remain open until filled.

  Fullsteam supports an inclusive workplace that values diversity of thought, experience, and background. Fullsteam is an Equal Opportunity/Affirmative Action employer. All qualified applicants will receive consideration for employment without regard to race, religion, color, national origin, ancestry, age, physical or mental disability, sex, sexual orientation, gender identity/expression, pregnancy, veteran status, marital status, creed, status with regard to public assistance, genetic status or any other status protected by federal, state, or local law.