job_title: DevOps Engineer
location: London, UK
company: Valarian
description: |
  Valarian Technologies is a dual-use technology company building critical tools to safeguard the future in an era of evolving global security challenges. We're rethinking security beyond traditional military domains, addressing asymmetric threats that impact our technological advantage, economic strength, and democratic institutions.
   
  We build Acra – the platform foundation for everything we do as a dual-use technology company. The platform’s name, rooted in the Greek word for citadel (or, fortress), reflects the design and purpose of our infrastructure-agnostic secure enclaves: protecting critical data. Some of the government and commercial workflows include: increased operational resiliency for mission-critical systems and functions; enabling organizations to more quickly and widely adopt emerging technologies while ensuring the integrity of their intellectual property; information flow during disaster response scenarios, and zero-trust / least-privilege environments for M&A, attorney-client privileged communications, etc. And we’ve only scratched the surface.


  At our core, we're driven by a shared mission and a belief in making a tangible impact on our world. Whether you join our London HQ or the wider global organisation, you’ll be a part of collaborative, high-performing teams, creating cutting-edge software, platforms, and infrastructure.


  The Role


  We are seeking a highly skilled DevOps Engineer to join our team and play a pivotal role in driving our organisation's continuous innovation and growth.


  As a DevOps Engineer, you will be responsible for designing, implementing, and maintaining the infrastructure and processes that empower our software development teams to deliver high-quality software with agility and efficiency. You will work closely with developers, operations engineers, and other stakeholders to ensure that our systems are scalable, secure, and always available to our customers.


  Mission statement: we build simple solutions for hardcore problems!




  What you'll do:


  - Design, develop, and implement DevOps solutions to automate the software development lifecycle, from code deployment to production monitoring.
  - Architect and manage complex cloud-based infrastructure, including Azure and Google Cloud Platform (GCP).
  - Lead the implementation of Github Actions CI/CD pipelines to ensure seamless and rapid software deployments.
  - Develop and maintain monitoring and alerting systems to proactively identify and resolve performance issues and security threats.
  - Collaborate with developers to integrate DevOps practices into their daily workflows.
  - Mentor and guide junior DevOps engineers, fostering a culture of continuous learning and improvement.
  - Stay abreast of the latest DevOps technologies and trends, recommending and implementing innovative solutions.


  What you'll bring:


  - Proven experience as a DevOps Engineer.
  - In-depth understanding of DevOps principles and methodologies.
  - Expert-level proficiency in the following technologies: Kubernetes, Terraform, GCP.
  - Extensive experience with CI/CD tools such as Github Actions.
  - Strong understanding of containerisation technologies like Docker and Kubernetes whereyou understand how to run workload from the entry point.
  - Exceptional problem-solving and analytical skills.
  - Excellent communication and collaboration skills, with a knack for building strong relationships with cross-functional teams.


  Bonus Qualifications:
  - Experience with service meshes.
  - Knowledge of security best practices and experience implementing security controls in both Infrastructure and Kubernetes.
  - Good understanding of Infrastructure as code, dependency graphs, state management.


  Benefits


  Our benefits are designed to ensure our employees feel taken care of and are proud to be a part of the Valarian team. We are committed to consistently enhancing our benefit package, taking into account the overall well-being and needs of our teammates. Here are the key benefits accessible to all employees at Valarian Technologies:


  - Equity – because you have the right to own what you’re building
  - A competitive salary – because we value your unique skills
  - Employer pension contributions – because you deserve a secure future
  - Hybrid work setup – because everyone has different needs
  - Rewarding company retreats and meet ups that respect your work/life balance – because we love getting to know each other!


  Life at Valarian


  Our culture is built on inclusivity, compassion and flexibility – we want everyone to be empowered to achieve their goals at Valarian.


  The world is changing, and so is our way of working. If you want to join us in the London office – it’s quite nice! – you’re welcome to; and if you’d prefer to work remotely, that’s fine too.


  And as we build elegant solutions to simplify the complexities of business collaboration, we also simplify work life: contribute wherever and whenever allows you to be your best self. We trust each other to consistently raise the bar, and we challenge each other to continually reach new heights.




