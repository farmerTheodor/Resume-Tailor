job_title: Cloud Engineer
location: Remote - United States
company: Skillable
description: |
  Responsibilities

  Design resilient and scalable solutions for high availability and disaster recovery 
  Zealously pursue cloud cost optimization, both for platform infrastructure and lab cloud fabrics 
  Work with the data and billing teams to ensure financial transparency (costs properly allocated to labs) and to identify/prevent fraudulent charges 
  Build a defense in depth around our cloud platform and lab fabrics to ensure all possible security measures are in place for securing our cloud resources 
  Implement monitoring for availability, performance and cost 
  Automate routine tasks (example: orphan object cleanups) and drive the creation of infrastructure as code (IAC) 
  Troubleshoot and resolve technical issues related to cloud infrastructure 
  Communicate internally the status of issues, outages challenges and risks 
  Act as the cloud team representative during incidents 
  Guide and influence decisions with proven data analysis and metrics to ensure clear understanding across all levels of the organization 
  Support and promote the company values through positive interaction with both internal and external partners and customers on a regular basis 
  Other strategic business initiatives or cross-functional project involvement as required 

    

  Qualifications

  Bachelor's degree in Computer Science, Engineering, Mathematics, Software Engineering, or related field preferred, but not required 
  5+ years of professional experience supporting an always on global SaaS application, and architecting software solutions using native Azure functionality 
  2+ years of experience in SRE and DevOps methodologies 
  Approaches problems with an automation-first mindset and prefers spending the day writing PowerShell versus clicking buttons in the Azure Portal 
  Demonstrated history of working collaboratively and across organizational boundaries 
  Demonstrated history of working with senior leaders from other teams and with customer technical stakeholders 
  Deep technical knowledge of scripting and automation as applies to public cloud infrastructure deployment and management 
  Rockstar troubleshooting abilities, especially as it relates to fixing something you didn’t create and for which documentation doesn’t exist 
  Experience with programming, Docker/Kubernetes/container management, Git/Github, a cloud provider platform such as Azure, AWS, Google and scripting languages such as PowerShell, Bash, or Python 
  Experience creating infrastructure as code, both greenfield and brownfield 
  Assist in writing documentation that includes the necessary information required for publishing to internal or external audiences    
  Ability to multi-task, stay organized, exercise strong time management and prioritize work on a daily and weekly basis 
  Ability to present and convey material both formally and informally to all levels of the organization 
  Ability to work with others to take sets of abstract requirements and define methods of achieving those requirements using the released capabilities of a platform 
  Ability to objectively analyze how a platform is used and make recommendations on how to improve the platform through operational and development requests 
  Excellent written, oral, listening and communication skills 
  Interest and ability in mentoring other team members as applicable 
  Strong MS Office, web conferencing and internal communication software experience 
  Familiar with SCRUM and Agile processes 




  Salary Range 




  The base salary for this position is $120,000 - $150,000 annually.  Consistent with applicable laws, compensation will be determined based on the candidate's level, relevant skills, qualifications, and experience along with requirements for the position and annual financial plans. 




  Skillable is a distributed first team with employees working across the U.S., and we do not consider geography when determining compensation ranges. 




  Please note that it is not typical for an individual to be hired at or near the top of the range. Skillable reserves the right to modify this compensation range at any time. 




  Pay range and current benefit offerings are effective for 90 days from posting date.  Standard employment offerings are subject to potential change upon periodic review and analysis, at the discretion of Skillable.




  What’s in it for You?  Rewards and Perks 




  We believe in providing a suite of benefits that ensure our employees know we appreciate them as people first.  Skillable wants to be a company that promotes physical, emotional and all around well-being through our benefit offerings! Subject to eligibility requirements, the Company offers comprehensive benefits including: 

  Fully remote with a monthly stipend to pay for office services and supplies 
  Medical (2 plan options), dental (2 plan options), vision, health savings account with generous employer contributions, healthcare spending accounts, dependent care spending accounts, EAP, group paid life insurance, group paid STD and LTD and voluntary life/AD&D insurance, accident and critical illness options. 
  401(k) with Company match, tuition reimbursement, healthy lifestyle reimbursements. 
  Open PTO, Paid holidays, bereavement leave, parental leave, caregiver leave and paid FMLA leave. 
  Friends and Family Friday to end our standard workweek at 2pm local time; Full company closure during the 4th of July holiday week. 
  Access to pet insurance; Access for employees and dependents to Skillable learning opportunities through our product and more!   




  Working Conditions:  




  The job conditions for this position are in a remote home office setting, requiring a space that supports privacy and focus to attend to regular and frequent video and voice calls. Employees in this position use PC and phone on an on-going basis throughout the day. Periodic travel may be required equaling up to approximately 10% of the time.




  Skillable participates in E-Verify and will provide the federal government with your Form I-9 information to confirm that you are authorized to work int he U.S.  If E-Verify cannot confirm that you are authorized to work, this employer is required to give you written instructions and an opportunity to contact Department of Homeland Security (DHS) or Social Security Administration (SSA) so you can begin to resolve the issue before the employer can take any action against you, including terminating your employment.  

    

  Skillable can only hire potential candidates with a primary residence in the following States: AZ, CA, CO, FL, GA, ID, IN, KY, MA, ME, MI, MO, NC, ND, NE, NH, NV, NY, OH, OK, SC, TN, TX, UT, WA, WI.
